version: "3.9"

services:
  api:
    build: .
    container_name: annymo-eval-api
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app.py
      FLASK_ENV: ${FLASK_ENV}
      DATABASE_URL: ${SQLALCHEMY_DATABASE_URI}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - annymo-eval-network

  db:
    image: postgres:15-alpine
    container_name: annymo-eval-db
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRESQL_PORT}:${POSTGRESQL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - annymo-eval-network

volumes:
  postgres_data:

networks:
  annymo-eval-network:
    driver: bridge